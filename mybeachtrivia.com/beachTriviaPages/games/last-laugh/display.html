<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Last Laugh Display</title>
  <link rel="stylesheet" href="./css/display.css" />
  <script type="module" src="./js/display-app.js"></script>
</head>
<body>
  <main class="fa-display">
    <header class="fa-display-head">
      <div class="fa-display-kicker">Beach Trivia</div>
      <h1 id="display-title">Last Laugh</h1>
      <p id="display-phase">Connecting…</p>
      <p id="display-status" class="fa-display-status"></p>
    </header>

    <section class="fa-display-panel">
      <div class="fa-display-eyebrow">Prompt</div>
      <h2 id="display-prompt">—</h2>
    </section>

    <section class="fa-display-panel">
      <div class="fa-display-eyebrow">Answers / Results</div>
      <div id="display-answer-list" class="fa-display-list"></div>
    </section>
  </main>
</body>
</html>
