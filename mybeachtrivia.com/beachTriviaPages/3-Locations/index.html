<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <link rel="stylesheet" href="style.css" />

  <script src="script.js" defer></script>
</head>

<body>
  <header>
    <nav>
      <div class="logo-container">
        <a href="/index.html">
          <img src="/beachTriviaPages/images/BTlogo.png" alt="Beach Trivia Logo" />
        </a>
      </div>
      <div class="nav-button-container">
        <ul>
          <li><a href="/beachTriviaPages/1-GetStarted/index.html">GET STARTED</a></li>
          <li><a href="/beachTriviaPages/2-OurServices/index.html">OUR SERVICES</a></li>
          <li class="current-page"><a href="/beachTriviaPages/3-Locations/index.html">LOCATIONS</a></li>
          <li><a href="/beachTriviaPages/4-JoinOurTeam/index.html">JOIN OUR TEAM</a></li>
          <li><a href="/beachTriviaPages/5-AboutUs/index.html">ABOUT US</a></li>
          <li><a href="/beachTriviaPages/6-Tournament/index.html">TOURNAMENT</a></li>
        </ul>
      </div>
      <div class="login-container">
        <div class="login-button">
          <a href="/login.html"><h2>STAFF LOGIN</h2></a>
        </div>
      </div>
      <div class="toggle-button">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>
    </nav>
  </header>

  <div id="header-mask"></div>
  <div id="js-barrier"></div>

  <main>
    <div id="trivia" class="service">
      <div class="fade-overlay"></div>
      <div class="service-content">
        <div class="image-container">
          <img src="../images/Interrobang.svg.png" alt="Interrobang Image - Trivia" class="service-image" />
          <img src="../images/podium.png" alt="Survey Image - FEUD" class="service-image" />
          <img src="../images/headphones.png" alt="Headphones Image - Music Bingo" class="service-image" />
        </div>

        <h2>Trivia Night Locations</h2>

        <div id="map-container">
          <h3>Find Our Events</h3>

          <div id="locations-filters" class="locations-filters" aria-label="Locations filters">
            <div class="filter-row">
              <label for="datePresetSelect">Date Range</label>
              <select id="datePresetSelect">
                <option value="next7">Next 7 days</option>
                <option value="next30" selected>Next 30 days</option>
                <option value="next90">Next 90 days</option>
                <option value="thisMonth">This month</option>
                <option value="custom">Custom</option>
              </select>
            </div>

            <div class="filter-row filter-custom-dates" id="customDatesRow" style="display:none;">
              <div class="filter-subrow">
                <label for="startDateInput">Start</label>
                <input id="startDateInput" type="date" />
              </div>
              <div class="filter-subrow">
                <label for="endDateInput">End</label>
                <input id="endDateInput" type="date" />
              </div>
            </div>

            <div class="filter-row">
              <label for="eventTypeSelect">Event Type</label>
              <select id="eventTypeSelect">
                <option value="all" selected>All</option>
              </select>
            </div>

            <div class="filter-row">
              <label for="dayOfWeekSelect">Day of Week</label>
              <select id="dayOfWeekSelect">
                <option value="all" selected>All Days</option>
                <option value="0">Sunday</option>
                <option value="1">Monday</option>
                <option value="2">Tuesday</option>
                <option value="3">Wednesday</option>
                <option value="4">Thursday</option>
                <option value="5">Friday</option>
                <option value="6">Saturday</option>
              </select>
            </div>
          </div>

          <div id="map-layout">
            <aside id="locations-overlay" aria-label="Scheduled events">
              <h4 class="overlay-title">Scheduled Events</h4>

              <div id="locationsOverlayStatus" class="overlay-status" aria-live="polite">
                Loading venues…
              </div>

              <div id="locationsOverlayBody"></div>
            </aside>

            <div id="map-wrapper">
              <div id="map" style="width:100%; height:550px; border-radius:10px;"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="BeachTriviaLLC">
      <h4 class="footer-text">Beach Trivia LLC</h4>
    </div>

    <div class="social-media-container">
      <a href="#"><img src="../images/FBlogo.png" id="fb-logo" alt="Facebook Logo Link" /></a>
      <a href="#"><img src="../images/GMAILlogo2.png" id="gmail-logo" alt="GMail logo Link" /></a>
      <a href="#"><img src="../images/INSTAlogo2.png" id="instagram-logo" alt="Instagram Logo Link" /></a>
    </div>

    <div class="contact">
      <h4 class="footer-text">Contact Us</h4>
    </div>
  </footer>
</body>
</html>
