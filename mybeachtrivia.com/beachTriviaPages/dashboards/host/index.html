<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Dashboard (Host)</title>

  <!-- Page styles -->
  <link rel="stylesheet" href="style.css" />

  <!-- Unified nav bar -->
  <link rel="stylesheet" href="/beachTriviaPages/js/bt-nav.css">

  <!-- Firebase SDKs (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-functions-compat.js" defer></script>

  <!-- Firebase initializer (compat) -->
  <script src="/beachTriviaPages/js/firebase-init-compat.js?v=1" defer></script>

  <!-- Route/auth guard -->
  <script src="/beachTriviaPages/js/auth-route-guard.v2.js?v=2025-10-14a" defer></script>

  <!-- Host role guard (host|admin allowed) -->
  <script src="/beachTriviaPages/dashboards/host/guard-host.js?v=1" defer></script>

  <!-- Unified nav bar (injects top nav + bell) -->
  <script src="/beachTriviaPages/js/bt-nav.js" defer></script>

  <!-- Main dashboard logic -->
  <script src="dashboard.js?v=2" defer></script>
</head>

<body>

  <!-- Authentication loading overlay -->
  <div id="auth-loading">
    <div class="spinner"></div>
    <p>Verifying access…</p>
  </div>

  <!-- Error overlay -->
  <div id="error-container">
    <div class="error-message">
      <p id="error-text">An error occurred. Please try again.</p>
      <button id="back-to-login" type="button">Return to Login</button>
    </div>
  </div>

  <!-- Dashboard (revealed after auth) -->
  <div class="dashboard-container" style="display:none;">
    <div class="dashboard-shell">
      <div class="host-dashboard-stage">
        <div class="host-dashboard-grid">

          <!-- ── Left column: Today + Upcoming ─────────────────────── -->
          <div class="left-column">

            <!-- Today's Show -->
            <div class="dashboard-panel today-show-card">
              <p class="panel-title">Today's Show</p>
              <div class="today-show-icon" aria-hidden="true">🎤</div>
              <p class="today-show-name" id="today-show-name">Loading…</p>
              <p class="today-show-address" id="today-show-address"></p>
              <p class="today-show-time" id="today-show-time">—</p>
            </div>

            <!-- Upcoming Shows -->
            <div class="dashboard-panel upcoming-card">
              <p class="panel-title">Upcoming Shows</p>
              <div class="upcoming-list" id="upcoming-shows-list">
                <!-- populated by dashboard.js -->
              </div>
              <a class="calendar-btn" href="./employee-calendar/">View Full Calendar</a>
            </div>

          </div><!-- /left-column -->

          <!-- ── Center column: Brand + Actions ───────────────────── -->
          <div class="center-column">
            <div class="dashboard-panel brand-panel">

              <div class="brand-logo-wrap">
                <img
                  src="/beachTriviaPages/images/BTlogo.png"
                  alt="Beach Trivia logo"
                />
              </div>

              <div class="host-action-stack">
                <a class="host-action-btn" href="./employee-calendar/">📅 Calendar</a>
                <a class="host-action-btn" href="./scoresheet/">📊 Scoresheet</a>
                <a class="host-action-btn" href="./host-music-bingo/host-music-bingo.html">🎵 Music Bingo</a>
                <button class="host-action-btn" type="button" disabled style="opacity:.45;cursor:default;">📦 Request Materials</button>
                <button class="host-action-btn" type="button" disabled style="opacity:.45;cursor:default;">📚 Resources</button>
              </div>

              <!-- Pay-period stats -->
              <div style="margin-top:20px;display:grid;grid-template-columns:1fr 1fr;gap:10px;text-align:center;">
                <div class="dashboard-panel" style="padding:12px 8px;">
                  <p class="panel-title" style="margin-bottom:4px;">Pay Period</p>
                  <p id="pay-period-display" style="margin:0;font-weight:800;font-size:0.95rem;color:var(--host-panel-text);">—</p>
                </div>
                <div class="dashboard-panel" style="padding:12px 8px;">
                  <p class="panel-title" style="margin-bottom:4px;">Shows Worked</p>
                  <p id="shows-worked-display" style="margin:0;font-weight:800;font-size:0.95rem;color:var(--host-panel-text);">—</p>
                </div>
              </div>

            </div>
          </div><!-- /center-column -->

          <!-- ── Right column: Announcements ──────────────────────── -->
          <div class="right-column">
            <div class="dashboard-panel announcements-panel">
              <p class="panel-title">Announcements</p>
              <div class="announcement-list" id="announcements-list">
                <!-- populated by dashboard.js -->
              </div>
              <p class="announcement-footer">mybeachtrivia.com</p>
            </div>
          </div><!-- /right-column -->

        </div><!-- /host-dashboard-grid -->
      </div><!-- /host-dashboard-stage -->
    </div><!-- /dashboard-shell -->
  </div><!-- /dashboard-container -->

</body>
</html>
