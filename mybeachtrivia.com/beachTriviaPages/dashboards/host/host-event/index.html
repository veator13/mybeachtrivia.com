<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Host Event</title>

  <link rel="stylesheet" href="/beachTriviaPages/js/bt-nav.css" />
  <script src="/beachTriviaPages/js/bt-nav.js?v=hostnav-20260424-3" defer></script>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-functions-compat.js" defer></script>

  <script src="/beachTriviaPages/js/firebase-init-compat.js?v=1" defer></script>
  <script src="/beachTriviaPages/dashboards/host/guard-host.js?v=2" defer></script>
  <script src="host-event.js?v=4" defer></script>

  <style>
    :root {
      --host-bg: #08111d;
      --host-stage: rgba(8, 13, 22, 0.68);
      --host-panel: rgba(255, 255, 255, 0.92);
      --host-panel-text: #1c2430;
      --host-muted: #66707d;
      --host-accent: #55c6ec;
      --host-accent-strong: #2995f3;
      --host-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
      --host-panel-shadow: 0 12px 30px rgba(0, 0, 0, 0.16);
      --host-border: rgba(255, 255, 255, 0.08);
      --host-dark-btn: #232326;
      --host-dark-btn-hover: #17181b;
      --host-soft-btn: #e7eef6;
      --host-soft-btn-hover: #dbe5f0;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(85, 198, 236, 0.18), transparent 34%),
        linear-gradient(180deg, #09111b 0%, #060b12 100%);
      color: #fff;
    }

    #auth-loading {
      position: fixed;
      inset: 0;
      background: var(--host-bg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      color: #fff;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 4px solid rgba(255, 255, 255, 0.14);
      border-top-color: var(--host-accent-strong);
      animation: spin 1s linear infinite;
      margin-bottom: 14px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #error-container {
      position: fixed;
      inset: 0;
      background: rgba(6, 11, 18, 0.92);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1001;
      padding: 20px;
    }

    .error-message {
      width: min(440px, 100%);
      background: #f8d7da;
      color: #721c24;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      box-shadow: var(--host-panel-shadow);
    }

    .error-message button {
      margin-top: 14px;
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: #c82333;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    .error-message button:hover {
      background: #a71d2a;
    }

    .page-shell {
      display: none;
      min-height: 100vh;
      padding: 88px 20px 28px;
    }

    .page-stage {
      width: min(1100px, 100%);
      margin: 0 auto;
      background: var(--host-stage);
      border: 1px solid var(--host-border);
      border-radius: 24px;
      box-shadow: var(--host-shadow);
      backdrop-filter: blur(10px);
      padding: 22px;
      transition: width 0.2s ease, padding 0.2s ease;
    }

    .page-stage.game-open {
      width: calc(100vw - 32px);
      padding: 12px;
      border-radius: 16px;
    }

    .page-header {
      margin-bottom: 20px;
    }

    .page-header-copy {
      min-width: 0;
      margin-bottom: 18px;
    }

    .page-eyebrow {
      margin: 0 0 6px;
      font-size: 0.84rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9cc8e7;
    }

    .page-title {
      margin: 0;
      font-size: clamp(1.7rem, 3vw, 2.4rem);
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: 0.01em;
    }

    .page-subtitle {
      margin: 8px 0 0;
      max-width: 720px;
      color: rgba(255, 255, 255, 0.76);
      line-height: 1.5;
      font-size: 1rem;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 20px;
    }

    .panel {
      background: var(--host-panel);
      color: var(--host-panel-text);
      border-radius: 20px;
      box-shadow: var(--host-panel-shadow);
      padding: 22px;
      min-width: 0;
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--host-muted);
    }

    .event-tiles {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .event-tile {
      display: block;
      text-decoration: none;
      text-align: left;
      font-family: inherit;
      cursor: pointer;
      color: #1a2430;
      background: linear-gradient(145deg, #f6fbff 0%, #eaf2fb 100%);
      border: 1px solid rgba(41, 149, 243, 0.18);
      border-radius: 16px;
      padding: 16px;
      min-height: 130px;
      transition:
        transform 0.18s ease,
        box-shadow 0.18s ease,
        border-color 0.18s ease;
    }

    .event-tile:hover {
      transform: translateY(-2px);
      border-color: rgba(41, 149, 243, 0.42);
      box-shadow: 0 12px 26px rgba(15, 29, 48, 0.15);
    }

    .event-tile-title {
      margin: 0 0 8px;
      font-size: 1.05rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #111b28;
    }

    .event-tile-copy {
      margin: 0;
      color: #455365;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .event-tile-badge {
      display: inline-block;
      margin-top: 12px;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: rgba(41, 149, 243, 0.12);
      color: #1c4f83;
    }

    .event-tile.disabled {
      cursor: not-allowed;
      opacity: 0.82;
      background: linear-gradient(145deg, #f2f4f7 0%, #e8ebef 100%);
      border-color: rgba(54, 66, 84, 0.2);
    }

    .event-tile.disabled:hover {
      transform: none;
      box-shadow: none;
      border-color: rgba(54, 66, 84, 0.2);
    }

    .utility-links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .utility-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 10px 16px;
      border-radius: 12px;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      font-size: 0.84rem;
      font-weight: 900;
      background: #232326;
      color: #fff;
    }

    @media (max-width: 900px) {
      .event-tiles {
        grid-template-columns: 1fr;
      }
    }

    .game-frame-view {
      display: none;
    }

    .back-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      position: sticky;
      top: 72px;
      z-index: 10;
      background: rgba(8, 13, 22, 0.85);
      backdrop-filter: blur(8px);
      padding: 8px 0;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      border-radius: 10px;
      border: none;
      background: var(--host-dark-btn);
      color: #fff;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .back-btn:hover {
      background: var(--host-dark-btn-hover);
    }

    .game-label {
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.55);
    }

    .game-iframe {
      width: 100%;
      height: calc(100vh - 180px);
      min-height: 500px;
      border: none;
      border-radius: 16px;
      background: var(--host-bg);
    }

    @media (max-width: 640px) {
      .page-shell {
        padding: 82px 12px 18px;
      }

      .page-stage {
        padding: 14px;
        border-radius: 18px;
      }

      .panel {
        padding: 16px;
        border-radius: 16px;
      }

      .utility-links {
        flex-direction: column;
      }

      .utility-link {
        width: 100%;
      }

      .game-iframe {
        height: calc(100vh - 160px);
      }
    }
  </style>
</head>

<body data-page="host-event">
  <div id="auth-loading">
    <div class="spinner"></div>
    <p>Verifying access...</p>
  </div>

  <div id="error-container">
    <div class="error-message">
      <p id="error-text">An error occurred. Please try again.</p>
      <button id="back-to-login" type="button">Return to Login</button>
    </div>
  </div>

  <div class="page-shell" id="page-shell">
    <main class="page-stage">
      <header class="page-header">
        <div class="page-header-copy">
          <p class="page-eyebrow">Host Tools</p>
          <h1 class="page-title">Host Event</h1>
        </div>
      </header>

      <div class="game-frame-view" id="game-frame-view">
        <div class="back-bar">
          <button class="back-btn" id="back-to-menu" type="button">← Back</button>
          <span class="game-label" id="game-label"></span>
        </div>
        <iframe class="game-iframe" id="game-iframe" src="" title="Game"></iframe>
      </div>

      <section class="content-grid" aria-label="Host event content">
        <section class="panel" aria-labelledby="event-tools-title">
          <h2 id="event-tools-title">Choose Event Type</h2>

          <div class="event-tiles">
            <button class="event-tile" type="button" data-game-url="/beachTriviaPages/dashboards/host/live-console/" data-game-name="Trivia">
              <h3 class="event-tile-title">Trivia</h3>
              <p class="event-tile-copy">Launch host trivia tools and run your standard game flow.</p>
              <span class="event-tile-badge">Live</span>
            </button>

            <button class="event-tile" type="button" data-game-url="/beachTriviaPages/dashboards/host/host-music-bingo/host-music-bingo.html" data-game-name="Music Bingo">
              <h3 class="event-tile-title">Music Bingo</h3>
              <p class="event-tile-copy">Open the music bingo host console and start your playlist flow.</p>
              <span class="event-tile-badge">Live</span>
            </button>

            <button class="event-tile" type="button" data-game-url="/beachTriviaPages/dashboards/host/host-funny-answers/" data-game-name="Funny Answers">
              <h3 class="event-tile-title">Funny Answers</h3>
              <p class="event-tile-copy">Run funny answers mode and manage game prompts.</p>
              <span class="event-tile-badge">Live</span>
            </button>

            <button class="event-tile disabled" type="button" disabled aria-disabled="true">
              <h3 class="event-tile-title">FEUD</h3>
              <p class="event-tile-copy">Coming soon. FEUD tile is in place and will link later.</p>
              <span class="event-tile-badge">Soon</span>
            </button>
          </div>

          <div class="utility-links">
            <a class="utility-link" href="/beachTriviaPages/dashboards/host/">Back to Dashboard</a>
            <a class="utility-link" href="/beachTriviaPages/dashboards/host/employee-calendar/">View Calendar</a>
          </div>
        </section>
      </section>
    </main>
  </div>
</body>
</html>
