<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Music Bingo Playlist Creator</title>

  <!-- Page styles (optional) -->
  <!-- Unified nav bar -->
  <link rel="stylesheet" href="/beachTriviaPages/js/bt-nav.css">
  <script src="/beachTriviaPages/js/bt-nav.js" defer></script>
  <style>
    body { background:#111; color:#eee; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
    .wrap { max-width: 980px; margin: 40px auto; background:#171717; border-radius:14px; padding:24px 28px; box-shadow: 0 8px 24px rgba(0,0,0,.35); }
    h1 { text-align:center; color:#b388ff; line-height:1.2; margin: 10px 0 22px; }
    .toolbar { display:flex; gap:14px; justify-content:center; margin: 12px 0 20px; }
    .toolbar button { padding:10px 14px; border:0; border-radius:8px; font-weight:600; cursor:pointer; }
    .toolbar .primary { background:#22c55e; color:#111; }
    .toolbar .blue { background:#3b82f6; color:white; }
    .toolbar .purple { background:#a855f7; color:white; }
    .toolbar .danger { background:#ef4444; color:white; }
    .controls { display:flex; gap:12px; align-items:center; margin: 14px 0 16px; }
    .controls input, .controls select { flex:1; background:#222; color:#ddd; border:1px solid #333; padding:10px 12px; border-radius:8px; }
    table { width:100%; border-collapse:collapse; background:#1e1e1e; border-radius:10px; overflow:hidden; }
    thead th { text-align:left; background:#262626; color:#b388ff; padding:12px; font-weight:700; }
    tbody td { padding:12px; border-top:1px solid #2c2c2c; }
    tbody input { width:100%; background:#262626; color:#eee; border:1px solid #333; padding:8px 10px; border-radius:6px; }
    .remove-row-cell { text-align:right; }
    .remove-row-cell button { background:#444; color:#eee; border:0; padding:8px 10px; border-radius:6px; cursor:pointer; }
    .row-actions { display:flex; justify-content:flex-end; }
    .footer-actions { display:flex; justify-content:flex-end; margin-top:16px; }
    .footer-actions button { background:#a855f7; color:white; border:0; padding:10px 14px; border-radius:8px; font-weight:700; cursor:pointer; }
    /* Modal */
    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); place-items:center; z-index:1000; }
    .modal > .card { width:min(520px, 92vw); max-height:90vh; display:flex; flex-direction:column; background:#171717; border:1px solid #2b2b2b; border-radius:14px; padding:18px; overflow:hidden; }
    .modal-scroll-body { overflow:auto; flex:1; min-height:0; }
    .modal h3 { margin:0 0 10px; }
    .modal .actions { display:flex; gap:10px; justify-content:flex-end; margin-top:12px; }
    .modal input { width:100px; }
  
  /* --- rocker button --- */
  .rocker {
    display: inline-flex;
    perspective: 500px;
  }
  .rocker-inner {
    position: relative;
    display: flex;
    border-radius: 10px;
    overflow: hidden;
    transform-style: preserve-3d;
    transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
    transform-origin: center center;
    background: linear-gradient(to bottom, #4f96ff, #2563eb);
    box-shadow:
      0 6px 18px rgba(0,0,0,.5),
      0 2px 4px rgba(0,0,0,.3),
      inset 0 1px 0 rgba(255,255,255,0.18),
      inset 0 -1px 0 rgba(0,0,0,0.2);
  }
  .rocker-left, .rocker-right {
    padding: 11px 22px;
    font-weight: 700;
    font-size: 0.88rem;
    border: 0;
    outline: none;
    -webkit-appearance: none;
    cursor: pointer;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    text-decoration: none;
    color: white;
    background: transparent;
    user-select: none;
    -webkit-user-select: none;
    letter-spacing: 0.01em;
    transition: filter 0.15s ease;
    position: relative;
    z-index: 1;
    -webkit-tap-highlight-color: transparent;
  }
  .rocker-left  { border-right: 1px solid rgba(255,255,255,0.25); }
  .rocker-right:focus { outline: none; box-shadow: none; }
  /* rock states */
  .rocker-inner.rock-left  { transform: rotateY(-3deg); }
  .rocker-inner.rock-left  .rocker-left  { filter: brightness(0.88); }
  .rocker-inner.rock-left  .rocker-right { filter: brightness(1.06); }
  .rocker-inner.rock-right { transform: rotateY(3deg); }
  .rocker-inner.rock-right .rocker-right { filter: brightness(0.88); }
  .rocker-inner.rock-right .rocker-left  { filter: brightness(1.06); }
  /* --- spacing tweaks for song table --- */
  tbody td{padding:14px 16px}
  tbody td + td{padding-left:12px}
  tbody tr + tr td{padding-top:14px}
  tbody input{padding:10px 12px;box-sizing:border-box}
  /* --- validation modal --- */
  #validationModal .card { max-width: min(720px, 94vw); }
  #validationModal table { width:100%; border-collapse:collapse; margin-top:10px; font-size:.9em; }
  #validationModal thead th { background:#262626; color:#b388ff; padding:8px 10px; text-align:left; }
  #validationModal tbody td { padding:8px 10px; border-top:1px solid #2c2c2c; }
  .validation-input { width:100%; background:#222; color:#eee; border:1px solid #333; padding:6px 8px; border-radius:5px; box-sizing:border-box; }
  .length-indicator { font-weight:700; }
  .length-valid   { color:#22c55e; }
  .length-invalid { color:#ef4444; }
  .override-btn { background:#444; color:#eee; border:0; padding:5px 10px; border-radius:5px; cursor:pointer; font-size:.85em; }
  .override-btn.active { background:#f59e0b; color:#111; }
</style>

  <!-- DO NOT include auth-gate.css/js here (redundant overlay) -->
</head>
<body>
  <div class="wrap">
    <h1>Music Bingo Playlist<br/>Creator</h1>

    <div class="toolbar">
      <button id="createNewPlaylistBtn" class="primary">Create New Playlist</button>
      <div class="rocker" id="spotifyRocker">
        <div class="rocker-inner" id="rockerInner">
          <a href="https://exportify.net/" target="_blank" rel="noopener" class="rocker-left" id="exportifyBtn">Open Exportify ↗</a>
          <button class="rocker-right" id="importCsvBtn">Import CSV</button>
        </div>
      </div>
      <button id="createBoardBtn" class="purple">Create Printable Board</button>
      <button id="deletePlaylistBtn" class="danger">Delete Playlist</button>
      <input id="csvFileInput" type="file" accept=".csv" style="display:none" />
    </div>

    <div class="controls">
      <select id="existingPlaylists" aria-label="Select Existing Playlist">
        <option value="">Select Existing Playlist</option>
      </select>
      <input id="playlistName" type="text" placeholder="Enter Playlist Name" />
    </div>

    <table>
      <thead>
        <tr>
          <th>Song Name</th>
          <th>Artist</th>
          <th>Album</th>
          <th>Track URI</th>
          <th style="width:110px;"></th>
        </tr>
      </thead>
      <tbody id="songTableBody"></tbody>
    </table>

    <div class="row-actions" style="margin-top:12px;">
      <button id="addRowBtn">Add Row</button>
    </div>

    <div class="footer-actions">
      <button id="savePlaylistBtn">Save Playlist</button>
    </div>
  </div>

  <!-- Validation modal for long text entries -->
  <div id="validationModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="validationTitle">
    <div class="card">
      <h3 id="validationTitle">Long Text Warning</h3>
      <p style="color:#fca5a5; margin:0 0 8px;">The following entries exceed the 40-character limit and may display incorrectly. Edit them below or click Override to accept as-is.</p>
      <div class="modal-scroll-body">
        <table>
          <thead>
            <tr><th>Type</th><th>Content</th><th>Length</th><th>Actions</th></tr>
          </thead>
          <tbody id="validationTableBody"></tbody>
        </table>
      </div>
      <div class="actions">
        <button id="cancelValidationBtn">Cancel</button>
        <button id="approveBtn" class="purple" disabled>Approve All</button>
      </div>
    </div>
  </div>

  <!-- Modal for number of copies -->
  <div id="boardCopiesModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="copiesTitle">
    <div class="card">
      <h3 id="copiesTitle">Create printable boards</h3>
      <p id="playlistWarning" style="display:none; color:#fca5a5; margin: 6px 0 12px;"></p>
      <label for="copiesInput">How many sets?</label>
      <input id="copiesInput" type="number" min="1" value="1" />
      <div class="actions">
        <button id="cancelBoardsBtn">Cancel</button>
        <button id="generateBoardsBtn" class="purple">Generate</button>
      </div>
    </div>
  </div>

  <!-- Route guard that ensures the user is already logged in site-wide -->

  <!-- Firebase boot (initializes the default app for this project) -->
  <script type="module" src="./boot-firebase.js"></script>

  <!-- Keep jspdf as classic script so pdfGenerator can use window.jspdf -->
  <script src="./vendor/jspdf.umd.min.js"></script>

  <!-- Rocker button animation -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const inner = document.getElementById('rockerInner');
      const left  = document.getElementById('exportifyBtn');
      const right = document.getElementById('importCsvBtn');
      function rock(side) {
        inner.classList.remove('rock-left', 'rock-right');
        inner.classList.add(side === 'left' ? 'rock-left' : 'rock-right');
      }
      function release() {
        inner.classList.remove('rock-left', 'rock-right');
      }
      left.addEventListener('mousedown',  () => rock('left'));
      right.addEventListener('mousedown', () => rock('right'));
      document.addEventListener('mouseup', release);
    });
  </script>

  <!-- Page scripts (modules) -->
  <script type="module" src="./js/script.js"></script>
  <script type="module" src="./js/validation.js"></script>
  <script type="module" src="./js/pdfGenerator.js"></script>
</body>
</html>
