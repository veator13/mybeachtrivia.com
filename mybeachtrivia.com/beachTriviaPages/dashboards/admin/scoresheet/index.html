   <style>
/* Search Bar Styling */
.search-container {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: auto;
}

.search-input {
    width: 220px;
    height: 42px;
    padding: 8px 16px;
    background-color: #2a2a2a;
    color: white;
    border: 2px solid #777;
    border-radius: 6px;
    font-size: 16px;
    transition: all 0.3s ease;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
}

.search-input:focus {
    border-color: #00ffcc;
    box-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
    outline: none;
}

.search-input::placeholder {
    color: #888;
}

/* Highlight animation for found teams */
@keyframes highlight-pulse {
    0% { background-color: rgba(0, 255, 204, 0.1); }
    50% { background-color: rgba(0, 255, 204, 0.3); }
    100% { background-color: rgba(0, 255, 204, 0.1); }
}

.highlighted-row {
    animation: highlight-pulse 1.5s ease-in-out infinite;
}

/* Adjust button container for search bar */
.button-container {
    display: flex;
    justify-content: flex-start;
    align-items: center;
    gap: 20px;
    margin: 25px 20px 15px;
    flex-wrap: wrap;
}

/* Responsive design for search container */
@media (max-width: 1000px) {
    .search-container {
        flex: 1 0 100%;
        margin-top: 15px;
        justify-content: flex-start;
    }
    
    .search-input {
        width: 100%;
        max-width: 300px;
    }
}
   </style>

   <script>
function searchTeams() {
    const searchTerm = document.getElementById('teamSearch').value.toLowerCase();
    if (searchTerm.trim() === '') { clearHighlights(); return; }
    let matchFound = false;
    const teamNameInputs = document.querySelectorAll('.teamName');
    clearHighlights();
    for (let i = 0; i < teamNameInputs.length; i++) {
        const teamNameInput = teamNameInputs[i];
        const teamNameValue = teamNameInput.value.toLowerCase();
        if (teamNameValue.includes(searchTerm)) {
            matchFound = true;
            const teamRow = teamNameInput.closest('tr');
            teamRow.classList.add('highlighted-row');
            scrollToTeam(teamRow);
            break;
        }
    }
    if (!matchFound) { alert('No team found with that name.'); }
}

function clearHighlights() {
    document.querySelectorAll('.highlighted-row').forEach(row => {
        row.classList.remove('highlighted-row');
    });
}

function scrollToTeam(teamRow) {
    const tableWrapper = document.querySelector('.table-wrapper');
    const headerHeight = document.querySelector('thead').offsetHeight;
    const rowPosition = teamRow.offsetTop - headerHeight - 10;
    tableWrapper.scrollTo({ top: rowPosition, behavior: 'smooth' });
}

document.addEventListener('DOMContentLoaded', function() {
    const searchInput = document.getElementById('teamSearch');
    if (searchInput) {
        searchInput.addEventListener('keyup', function(event) {
            if (event.key === 'Enter') { searchTeams(); }
            if (this.value.trim() === '') { clearHighlights(); }
        });
    }
});
   </script>
