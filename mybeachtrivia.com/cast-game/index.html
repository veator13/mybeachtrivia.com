<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cast Game Viewer</title>
  <meta name="theme-color" content="#081120" />

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js" defer></script>
  <script src="/beachTriviaPages/js/firebase-init-compat.js?v=1" defer></script>
  <script src="/beachTriviaPages/dashboards/shared/slide-paint.js?v=20260513-cat-vertical" defer></script>

  <link rel="stylesheet" href="/beachTriviaPages/dashboards/shared/preview-stage.css?v=20260513-ans-left" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg: #081120;
      --line: rgba(148, 163, 184, 0.18);
      --text: #e2e8f0;
      --muted: #9fb0c7;
      --blue: #4da3ff;
      --blue-2: #2d7fe0;
      --green: #22c55e;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
    }

    html, body {
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.45;
    }

    #loading-screen,
    #error-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 24px;
      text-align: center;
    }

    #error-screen { display: none; }

    .spinner {
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid var(--blue);
      border-radius: 50%;
      width: 42px;
      height: 42px;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Full-screen shell: centers the scaled preview stage */
    .viewer-shell {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #081120;
    }

    /*
      Reference size matches the host live-console cast column (~700px wide).
      A JS snippet below sets --cast-scale so the stage fills the viewport
      at the same proportions the host sees in their console preview.
    */
    .viewer-shell .preview-stage {
      width: 700px;
      height: 393.75px;
      flex-shrink: 0;
      max-width: none;
      max-height: none;
      aspect-ratio: unset;
      border-radius: 0;
      border: none;
      transform: scale(var(--cast-scale, 1));
      transform-origin: center center;
    }

    .viewer-shell .preview-stage::after {
      display: none;
    }

    .join-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(77, 163, 255, 0.12), transparent 28%),
        linear-gradient(180deg, #0d1830 0%, #081120 100%);
      z-index: 900;
    }

    .join-card {
      width: min(560px, 100%);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(19,36,67,0.98), rgba(10,20,38,0.98));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      border-radius: 999px;
      background: rgba(77, 163, 255, 0.14);
      color: #c9e7ff;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .join-card h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 38px);
      line-height: 1.1;
      color: #f8fbff;
    }

    .join-card p { margin: 0 0 18px; color: var(--muted); }

    .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }

    .field label { font-size: 13px; font-weight: 700; color: #e2e8f0; }

    input[type="text"] {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: #091425;
      color: #f8fbff;
      border-radius: 14px;
      padding: 13px 14px;
      font: inherit;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: rgba(77, 163, 255, 0.85);
      box-shadow: 0 0 0 3px rgba(77, 163, 255, 0.16);
    }

    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

    .btn {
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      min-height: 44px;
    }

    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { background: var(--blue-2); }

    .btn-secondary {
      background: rgba(148, 163, 184, 0.12);
      border-color: rgba(148, 163, 184, 0.22);
      color: #e2e8f0;
    }

    .status-floating {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 950;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(15, 27, 51, 0.88);
      border: 1px solid rgba(148,163,184,0.18);
      color: #d8e6f4;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      font-size: 12px;
      font-weight: 700;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(34,197,94,0.12);
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="spinner"></div>
    <p>Loading cast viewer…</p>
  </div>

  <div id="error-screen">
    <h2 style="margin:0 0 10px;">Unable to load viewer</h2>
    <p id="error-text" style="margin:0; max-width:540px; color:#9fb0c7;">Something went wrong.</p>
  </div>

  <div class="join-overlay" id="join-overlay">
    <div class="join-card">
      <span class="eyebrow">Beach Trivia • Cast Viewer</span>
      <h1>Join Live Session</h1>
      <p>Use the session code from the host console (same code in the cast URL).</p>
      <div class="field">
        <label for="session-code-input">Session Code</label>
        <input id="session-code-input" type="text" placeholder="Example: BT-4827" />
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" type="button" id="join-session-btn">Join Session</button>
        <button class="btn btn-secondary" type="button" id="reload-code-btn">Use URL Code</button>
      </div>
    </div>
  </div>

  <main class="viewer-shell" id="viewer-shell" aria-label="Cast slideshow">
    <div id="cast-stage" class="preview-stage"></div>
  </main>

  <div id="scoreboard-overlay" style="display:none; position:fixed; inset:0; z-index:200; background:linear-gradient(160deg,#081420 0%,#0b1e30 60%,#061018 100%); color:#fff; font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; overflow:hidden;"></div>

  <div class="status-floating" id="status-floating" style="display:none;">
    <span class="status-dot"></span>
    <span id="status-floating-text">Connected</span>
  </div>

  <script defer>
    document.addEventListener("DOMContentLoaded", function () {
      var loadingScreen = document.getElementById("loading-screen");
      var errorScreen = document.getElementById("error-screen");
      var errorText = document.getElementById("error-text");
      var joinOverlay = document.getElementById("join-overlay");
      var viewerShell = document.getElementById("viewer-shell");
      var castStage = document.getElementById("cast-stage");
      var sessionCodeInput = document.getElementById("session-code-input");
      var joinSessionBtn = document.getElementById("join-session-btn");
      var reloadCodeBtn = document.getElementById("reload-code-btn");
      var statusFloating = document.getElementById("status-floating");
      var statusFloatingText = document.getElementById("status-floating-text");

      var activeSessionCode = "";
      var unsubscribeSession = null;
      var lastSessionData = null;

      var scoreboardOverlay = document.getElementById("scoreboard-overlay");

      function showError(message) {
        if (loadingScreen) loadingScreen.style.display = "none";
        if (joinOverlay) joinOverlay.style.display = "none";
        if (viewerShell) viewerShell.style.display = "none";
        if (statusFloating) statusFloating.style.display = "none";
        if (errorText) errorText.textContent = message || "Unable to load viewer.";
        if (errorScreen) errorScreen.style.display = "flex";
      }

      function showJoin() {
        if (loadingScreen) loadingScreen.style.display = "none";
        if (errorScreen) errorScreen.style.display = "none";
        if (viewerShell) viewerShell.style.display = "none";
        if (joinOverlay) joinOverlay.style.display = "flex";
        if (statusFloating) statusFloating.style.display = "none";
      }

      var REF_W = 700, REF_H = 393.75;
      function updateCastScale() {
        var scale = Math.min(window.innerWidth / REF_W, window.innerHeight / REF_H);
        document.documentElement.style.setProperty("--cast-scale", scale);
      }
      updateCastScale();
      window.addEventListener("resize", updateCastScale);

      function showViewer() {
        if (loadingScreen) loadingScreen.style.display = "none";
        if (errorScreen) errorScreen.style.display = "none";
        if (joinOverlay) joinOverlay.style.display = "none";
        if (viewerShell) viewerShell.style.display = "flex";
        if (statusFloating) statusFloating.style.display = "inline-flex";
        updateCastScale();
      }

      function showLoading() {
        if (loadingScreen) loadingScreen.style.display = "flex";
        if (errorScreen) errorScreen.style.display = "none";
        if (joinOverlay) joinOverlay.style.display = "none";
        if (viewerShell) viewerShell.style.display = "none";
        if (statusFloating) statusFloating.style.display = "none";
      }

      function waitForFirebase(cb, attempts) {
        var n = attempts || 0;
        if (window.firebase && window.firebase.firestore) {
          cb();
          return;
        }
        if (n > 40) {
          showError("Firebase failed to load for the cast viewer.");
          return;
        }
        setTimeout(function () {
          waitForFirebase(cb, n + 1);
        }, 100);
      }

      function waitForSlidePaint(cb, attempts) {
        var n = attempts || 0;
        if (window.BeachTriviaSlidePaint && typeof window.BeachTriviaSlidePaint.paintSlide === "function") {
          cb();
          return;
        }
        if (n > 40) {
          showError("Slide renderer failed to load.");
          return;
        }
        setTimeout(function () {
          waitForSlidePaint(cb, n + 1);
        }, 50);
      }

      function getUrlCode() {
        try {
          var params = new URLSearchParams(window.location.search);
          return (params.get("code") || "").trim().toUpperCase();
        } catch (err) {
          return "";
        }
      }

      function setStatus(text) {
        if (statusFloatingText) statusFloatingText.textContent = text || "Connected";
      }

      function sessionDocToSlide(docData) {
        var cs = docData && docData.currentSlide ? docData.currentSlide : {};
        var theme = cs.theme || docData.theme || "";
        return {
          stateKey: (docData && docData.currentStateKey) || "",
          roundBadge: cs.roundBadge || "",
          stateLabel: cs.stateLabel || "",
          category: cs.category || "",
          question: cs.question || "",
          options: Array.isArray(cs.options) ? cs.options : [],
          answer: cs.answer || "",
          notes: cs.notes || "",
          kind: cs.kind || "",
          blockType: cs.blockType || "",
          questionType: cs.questionType || "",
          questionAlign: cs.questionAlign || "",
          questionFontScale: typeof cs.questionFontScale === "number" ? cs.questionFontScale : 1,
          matchingPairs: Array.isArray(cs.matchingPairs) ? cs.matchingPairs : [],
          orderingItems: Array.isArray(cs.orderingItems) ? cs.orderingItems : [],
          feudAnswers: Array.isArray(cs.feudAnswers) ? cs.feudAnswers : [],
          feudRevealCount: typeof cs.feudRevealCount === "number" ? cs.feudRevealCount : (typeof docData.feudRevealCount === "number" ? docData.feudRevealCount : null),
          theme: theme,
          alwaysReveal: !!cs.answerVisibleByDefault,
        };
      }

      function renderStandby(el) {
        if (!el) return;
        el.innerHTML =
          '<div style="display:flex;align-items:center;justify-content:center;min-height:120px;padding:clamp(16px,4cqw,32px);text-align:center;color:#94a3b8;font-size:clamp(13px,2.5cqw,18px);line-height:1.4;">Waiting for the host to press <strong style="color:#e2e8f0;">Go Live</strong> in the host console. This display matches <strong style="color:#e2e8f0;">Cast Preview / Cast Live</strong>.</div>';
      }

      var _castLastFeudReveal = null;
      var _castLastStateKey = null;
      var _castPendingHide = null;

      function _cancelCastHide() {
        if (_castPendingHide) { _castPendingHide.abort(); _castPendingHide = null; }
      }

      function esc(s) {
        return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      }

      var _scrollRAF = null;

      function stopAutoScroll() {
        if (_scrollRAF) { cancelAnimationFrame(_scrollRAF); _scrollRAF = null; }
      }

      function startAutoScroll(el) {
        stopAutoScroll();
        if (!el) return;
        var direction = 1;
        var pauseFrames = 0;
        var SPEED = 0.6;       // px per frame
        var PAUSE = 150;       // frames (~2.5s at 60fps) at top/bottom

        function tick() {
          if (!el || !el.isConnected) return;
          if (el.scrollHeight <= el.clientHeight + 2) return; // no overflow

          if (pauseFrames > 0) { pauseFrames--; _scrollRAF = requestAnimationFrame(tick); return; }

          el.scrollTop += direction * SPEED;

          if (direction === 1 && el.scrollTop + el.clientHeight >= el.scrollHeight - 2) {
            direction = -1; pauseFrames = PAUSE;
          } else if (direction === -1 && el.scrollTop <= 0) {
            direction = 1; pauseFrames = PAUSE;
          }

          _scrollRAF = requestAnimationFrame(tick);
        }

        // Wait 2s before starting so the host can read the top of the list first
        setTimeout(function() { _scrollRAF = requestAnimationFrame(tick); }, 2000);
      }

      function renderScoreboard(teams) {
        if (!scoreboardOverlay) return;

        var medals = ["🥇", "🥈", "🥉"];
        var items = "";
        if (!teams || !teams.length) {
          items = '<li style="text-align:center;opacity:0.45;padding:3vh 0;font-size:clamp(1rem,2.5vw,1.6rem);">No scores recorded yet.</li>';
        } else {
          teams.forEach(function(team, i) {
            var medal = medals[i] || ("#" + (i + 1));
            var isFirst = i === 0;
            items +=
              '<li style="' +
                'display:flex;align-items:center;gap:2vw;' +
                'background:' + (isFirst ? 'rgba(255,210,60,0.10)' : i === 1 ? 'rgba(180,180,200,0.07)' : i === 2 ? 'rgba(180,120,60,0.09)' : 'rgba(255,255,255,0.04)') + ';' +
                'border:1px solid ' + (isFirst ? 'rgba(255,210,60,0.25)' : 'rgba(255,255,255,0.07)') + ';' +
                'border-radius:12px;padding:1.6vh 2.4vw;' +
                'font-size:clamp(1rem,2.6vw,2rem);font-weight:800;' +
              '">' +
                '<span style="min-width:2.2em;text-align:center;font-size:0.9em;">' + medal + '</span>' +
                '<span style="flex:1;">' + esc(team.name) + '</span>' +
                '<span style="color:' + (isFirst ? '#ffd23c' : '#55c6ec') + ';font-size:1.05em;letter-spacing:0.02em;">' + team.score + ' pts</span>' +
              '</li>';
          });
        }

        scoreboardOverlay.innerHTML =
          '<div style="display:flex;flex-direction:column;align-items:center;height:100%;padding:4vh 5vw;box-sizing:border-box;">' +
            '<div style="font-size:clamp(0.6rem,1.2vw,0.9rem);font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:#55c6ec;margin-bottom:1.2vh;flex-shrink:0;">Beach Trivia</div>' +
            '<h1 style="margin:0 0 3vh;font-size:clamp(1.8rem,4.5vw,3.6rem);font-weight:900;letter-spacing:0.02em;flex-shrink:0;">Team Standings</h1>' +
            '<ol style="list-style:none;margin:0;padding:0 0 2vh;width:100%;max-width:900px;display:flex;flex-direction:column;gap:1.4vh;flex:1;min-height:0;overflow-y:auto;">' +
              items +
            '</ol>' +
          '</div>';
        scoreboardOverlay.style.display = "block";
        startAutoScroll(scoreboardOverlay.querySelector('ol'));
      }

      function hideScoreboard() {
        stopAutoScroll();
        if (scoreboardOverlay) scoreboardOverlay.style.display = "none";
      }

      function paintFromDoc(data) {
        if (data && data.castMode === "scoresheet") {
          renderScoreboard(data.scoreboard || []);
          return;
        }
        hideScoreboard();
        if (!castStage || !window.BeachTriviaSlidePaint) return;
        _cancelCastHide();
        lastSessionData = data;
        var slide = sessionDocToSlide(data || {});
        var reveal = !!(data && data.revealShown) || !!slide.alwaysReveal;

        var newCount = typeof slide.feudRevealCount === "number" ? slide.feudRevealCount : null;
        var oldCount = _castLastFeudReveal;
        var sameSlide = slide.stateKey && slide.stateKey === _castLastStateKey;
        var isFeud = slide.feudAnswers && slide.feudAnswers.length > 0;

        _castLastStateKey = slide.stateKey || null;
        _castLastFeudReveal = newCount;

        if (isFeud && sameSlide && typeof newCount === "number" && typeof oldCount === "number") {
          var totalFilled = slide.feudAnswers.filter(function (a) {
            return String((a && a.text) || "").trim().length > 0;
          }).length;

          if (newCount === oldCount + 1) {
            // Reveal next — deferred flip animation
            var deferIdx = totalFilled - newCount;
            var paintData = Object.assign({}, slide, { feudRevealDeferIndex: deferIdx });
            window.BeachTriviaSlidePaint.paintSlide(castStage, paintData, reveal);
            requestAnimationFrame(function () {
              requestAnimationFrame(function () {
                var row = castStage.querySelector("[data-feud-defer-flip]");
                if (row) { row.removeAttribute("data-feud-defer-flip"); row.classList.add("revealed"); }
              });
            });
            return;
          }

          if (newCount === oldCount - 1) {
            // Hide prev — flip-back animation, then repaint
            var hideIdx = totalFilled - oldCount;
            var row = castStage.querySelector('.slide-feud-row--card[data-feud-idx="' + hideIdx + '"]');
            if (row && row.classList.contains("revealed")) {
              var reducedMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
              if (reducedMotion) {
                row.classList.remove("revealed");
                window.BeachTriviaSlidePaint.paintSlide(castStage, slide, reveal);
                return;
              }
              var inner = row.querySelector(".slide-feud-row-flip-inner");
              var aborted = false; var done = false; var tid = null;
              var s = slide; var r = reveal;
              function finish() {
                if (done) return; done = true;
                if (tid) { clearTimeout(tid); tid = null; }
                _castPendingHide = null;
                if (!aborted) window.BeachTriviaSlidePaint.paintSlide(castStage, s, r);
              }
              _castPendingHide = {
                abort: function () {
                  aborted = true;
                  if (tid) { clearTimeout(tid); tid = null; }
                  if (inner) inner.removeEventListener("transitionend", onEnd);
                  _castPendingHide = null;
                }
              };
              if (inner) {
                var onEnd = function (e) {
                  if (e && e.propertyName && e.propertyName.indexOf("transform") === -1) return;
                  inner.removeEventListener("transitionend", onEnd);
                  finish();
                };
                inner.addEventListener("transitionend", onEnd);
                tid = setTimeout(finish, 800);
              }
              row.classList.remove("revealed");
              if (!inner) finish();
              return;
            }
          }
        }

        window.BeachTriviaSlidePaint.paintSlide(castStage, slide, reveal);
      }

      if (castStage && typeof ResizeObserver !== "undefined") {
        var _castResizeRaf = 0;
        new ResizeObserver(function () {
          if (!lastSessionData) return;
          if (_castResizeRaf) cancelAnimationFrame(_castResizeRaf);
          _castResizeRaf = requestAnimationFrame(function () {
            _castResizeRaf = 0;
            paintFromDoc(lastSessionData);
          });
        }).observe(castStage);
      }

      function joinSession(code) {
        activeSessionCode = String(code || "").trim().toUpperCase();
        if (!activeSessionCode) {
          showJoin();
          return;
        }

        if (sessionCodeInput) sessionCodeInput.value = activeSessionCode;
        showLoading();
        setStatus("Connecting…");

        if (unsubscribeSession) {
          try {
            unsubscribeSession();
          } catch (err) {}
          unsubscribeSession = null;
        }

        waitForFirebase(function () {
          waitForSlidePaint(function () {
            if (loadingScreen) loadingScreen.style.display = "none";
            showViewer();
            setStatus("Connecting…");

            var db = firebase.firestore();
            var docRef = db.collection("liveSessions").doc(activeSessionCode);

            unsubscribeSession = docRef.onSnapshot(
              function (docSnap) {
                showViewer();
                if (docSnap.exists) {
                  var data = docSnap.data() || {};
                  paintFromDoc(data);
                  setStatus("Live • synced");
                  return;
                }
                lastSessionData = null;
                renderStandby(castStage);
                setStatus("Waiting for host • Go Live");
              },
              function (err) {
                console.error("[cast-game] session doc subscription failed:", err);
                showViewer();
                if (castStage) {
                  castStage.innerHTML =
                    '<div style="padding:24px;color:#fca5a5;font-size:clamp(13px,2cqw,16px);">Could not subscribe to this session. Check the console (F12).</div>';
                }
                setStatus("Error • see console");
              }
            );
          });
        });
      }

      if (joinSessionBtn) {
        joinSessionBtn.addEventListener("click", function () {
          var code = (sessionCodeInput && sessionCodeInput.value) || "";
          code = String(code).trim();
          if (!code) {
            sessionCodeInput && sessionCodeInput.focus();
            return;
          }
          joinSession(code);
        });
      }

      if (reloadCodeBtn) {
        reloadCodeBtn.addEventListener("click", function () {
          var code = getUrlCode();
          if (sessionCodeInput) sessionCodeInput.value = code;
        });
      }

      if (sessionCodeInput) {
        sessionCodeInput.addEventListener("keydown", function (event) {
          if (event.key === "Enter") {
            event.preventDefault();
            joinSessionBtn && joinSessionBtn.click();
          }
        });
      }

      var initialCode = getUrlCode();
      if (sessionCodeInput) sessionCodeInput.value = initialCode;

      if (initialCode) {
        joinSession(initialCode);
      } else {
        if (loadingScreen) loadingScreen.style.display = "none";
        showJoin();
      }
    });
  </script>
</body>
</html>
